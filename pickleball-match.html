// =================== SCHEDULE PAGE ===================
var schViewMode = 'round'; // 'round' | 'court'

function switchSchView(mode) {
  schViewMode = mode;
  renderSchedule();
}

function renderSchedule() {
  var cont = document.getElementById('scheduleContent');
  if (!state || !state.started || !state.rounds.length) {
    cont.innerHTML = '<div class="empty"><div class="icon">📋</div>赛程尚未生成</div>';
    return;
  }

  var courts = state.courts || 2;
  var totalMatches = 0;
  state.rounds.forEach(function(r) { totalMatches += r.matches.length; });

  // ── 视图切换按钮 ──
  var viewToggleHtml = '<div class="sch-view-toggle">' +
    '<button class="toggle-btn' + (schViewMode === 'round' ? ' active' : '') + '" onclick="switchSchView(\'round\')">📊 按轮次</button>' +
    '<button class="toggle-btn' + (schViewMode === 'court' ? ' active' : '') + '" onclick="switchSchView(\'court\')">🏟️ 按场地</button>' +
  '</div>';

  // ── 工具栏 ──
  var toolbarHtml = '<div class="sch-toolbar">' +
    '<span class="sch-toolbar-label">共 ' + state.rounds.length + ' 轮 · ' + totalMatches + ' 场</span>' +
    '<button class="btn btn-outline btn-sm" onclick="showPrintPreview()">🖨 打印预览</button>' +
  '</div>';

  // ── 轮次视图（原逻辑） ──
  function buildRoundView() {
    var html = '';
    state.rounds.forEach(function(roundData, ri) {
      var allDone = roundData.matches.every(function(m) { return m.done; });
      var isCurrent = !state.finished && roundData.matches.some(function(m) {
        var ci = (m.court || 1) - 1;
        var pos = state.courtPositions && state.courtPositions[ci] !== undefined ? state.courtPositions[ci] : 0;
        var sch = getCourtSchedule(m.court);
        return sch.length > pos && sch[pos].roundIdx === ri && !sch[pos].match.done;
      });
      var headerClass = allDone ? 'done' : (isCurrent ? 'current' : '');
      var matchRows = roundData.matches.map(function(m) {
        var winA = m.done && m.scoreA > m.scoreB;
        var winB = m.done && m.scoreB > m.scoreA;
        var scoreStr, resultLeft, resultRight;
        if (m.done) {
          scoreStr = '<span class="sch-score done">' + m.scoreA + ' : ' + m.scoreB + '</span>';
          resultLeft = '<span class="sch-result ' + (winA?'w':'l') + '">' + (winA?'胜':'负') + '</span>';
          resultRight = '<span class="sch-result ' + (winB?'w':'l') + '">' + (winB?'胜':'负') + '</span>';
        } else if (isCurrent) {
          scoreStr = '<span class="sch-score pending">进行中</span>';
          resultLeft = ''; resultRight = '';
        } else {
          scoreStr = '<span class="sch-score pending">待赛</span>';
          resultLeft = ''; resultRight = '';
        }
        return '<div class="sch-match-row">' +
          '<span class="sch-court">场地' + m.court + '</span>' +
          '<span class="sch-team ' + (m.done?(winA?'win':'lose'):'') + '">' + m.teamA.join(' + ') + '</span>' +
          resultLeft +
          scoreStr +
          resultRight +
          '<span class="sch-team ' + (m.done?(winB?'win':'lose'):'') + '" style="text-align:right;">' + m.teamB.join(' + ') + '</span>' +
        '</div>';
      }).join('');
      var waitText = roundData.waiting.length ?
        '<span style="opacity:0.75;font-size:11px;font-weight:400;">候场：' + roundData.waiting.join('、') + '</span>' :
        '<span style="font-size:11px;font-weight:400;opacity:0.7">全员上场</span>';
      return '<div class="sch-round">' +
        '<div class="sch-round-header ' + headerClass + '">' +
          '<span>第 ' + roundData.round + ' 轮 ' + (isCurrent ? '🔴' : allDone ? '✓' : '') + '</span>' +
          waitText +
        '</div>' +
        matchRows +
      '</div>';
    });
    return html;
  }

  // ── 场地视图（按场地分组） ──
  function buildCourtView() {
    // 收集所有场地
    var courtNums = [];
    for (var c = 1; c <= courts; c++) courtNums.push(c);

    var colsHtml = courtNums.map(function(cn) {
      var matchesForCourt = [];
      state.rounds.forEach(function(roundData, ri) {
        var match = roundData.matches.find(function(m) { return m.court === cn; });
        if (match) {
          matchesForCourt.push({ round: roundData.round, match: match, ri: ri });
        }
      });

      var bodyHtml = matchesForCourt.length ? matchesForCourt.map(function(item) {
        var m = item.match;
        var isCurrent = item.ri === state.currentRound && !state.finished && !m.done;
        var winA = m.done && m.scoreA > m.scoreB;
        var winB = m.done && m.scoreB > m.scoreA;
        var doneCls = m.done ? 'done' : 'pending';
        var scoreStr = m.done ? m.scoreA + ' : ' + m.scoreB : (isCurrent ? '进行中' : '—');
        return '<div class="sch-court-match ' + doneCls + '">' +
          '<div class="round-lbl">第 ' + item.round + ' 轮</div>' +
          '<div class="teams">' +
            '<span class="team ' + (m.done?(winA?'winner':'loser'):'') + '">' + m.teamA.join('+') + '</span>' +
            (m.done ? '<span class="result-badge ' + (winA?'win':'lose') + '">' + (winA?'胜':'负') + '</span>' : '') +
            '<span class="score">' + scoreStr + '</span>' +
            (m.done ? '<span class="result-badge ' + (winB?'win':'lose') + '">' + (winB?'胜':'负') + '</span>' : '') +
            '<span class="team ' + (m.done?(winB?'winner':'loser'):'') + '" style="text-align:right;">' + m.teamB.join('+') + '</span>' +
          '</div>' +
        '</div>';
      }).join('') : '<div class="sch-court-empty">暂无比赛</div>';

      return '<div class="sch-court-col">' +
        '<div class="sch-court-card">' +
          '<div class="sch-court-card-header">🏟️ 场地 ' + cn + '</div>' +
          '<div class="sch-court-card-body">' + bodyHtml + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="sch-court-grid">' + colsHtml + '</div>';
  }

  // ── 打印版内容 ──
  var printDate = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
  var printRows = '';
  state.rounds.forEach(function(rd) {
    rd.matches.forEach(function(m) {
      var score = m.done ? (m.scoreA + ' - ' + m.scoreB) : '—';
      var status = m.done ? '✓' : '○';
      printRows += '<tr>' +
        '<td class="t">第' + rd.round + '轮</td>' +
        '<td class="t">' + m.court + '</td>' +
        '<td class="t ta">' + m.teamA.join(' / ') + '</td>' +
        '<td class="t sc">' + score + '</td>' +
        '<td class="t ta">' + m.teamB.join(' / ') + '</td>' +
        '<td class="t">' + status + '</td>' +
      '</tr>';
    });
  });
  var printHtml = '<div id="printSchedule" class="no-print-block">' +
    '<div class="print-header">' +
      '<div class="print-title">' + (state.name || '比赛') + ' · 赛程表</div>' +
      '<div class="print-meta">日期：' + printDate + '　　场地数：' + courts + '　　参赛人数：' + (state.players || []).filter(function(p){return p&&p.trim();}).length + '人</div>' +
    '</div>' +
    '<table class="print-table">' +
      '<thead><tr><th>轮次</th><th>场地</th><th>队伍 A</th><th>比分</th><th>队伍 B</th><th>状态</th></tr></thead>' +
      '<tbody>' + printRows + '</tbody>' +
    '</table>' +
    '<div class="print-footer">球馆小赛 · 扫码管理赛程</div>' +
  '</div>';

  // ── 组装 ──
  var bodyContent = schViewMode === 'round' ? buildRoundView() : buildCourtView();
  cont.innerHTML = printHtml + toolbarHtml + viewToggleHtml + bodyContent;
}
// =================== RANK PAGE ===================
function calcStats() {
  if (!state) return {};
  var stats = {};
  state.players.forEach(function(p) {
    stats[p] = { name: p, pts: 0, win: 0, lose: 0, gf: 0, ga: 0, played: 0, partners: {}, h2h: {} };
  });
  var parts = state.pointsRule.split('-').map(Number);
  var winPts = parts[0], losePts = parts[1];
  state.rounds.forEach(function(rd) {
    rd.matches.forEach(function(m) {
      if (!m.done) return;
      var sA = m.scoreA, sB = m.scoreB;
      var aWon = sA > sB;
      m.teamA.concat(m.teamB).forEach(function(p) { if (stats[p]) stats[p].played++; });
      m.teamA.forEach(function(p) {
        if (!stats[p]) return;
        stats[p].pts += aWon ? winPts : losePts;
        aWon ? stats[p].win++ : stats[p].lose++;
        stats[p].gf += sA; stats[p].ga += sB;
      });
      m.teamB.forEach(function(p) {
        if (!stats[p]) return;
        stats[p].pts += aWon ? losePts : winPts;
        aWon ? stats[p].lose++ : stats[p].win++;
        stats[p].gf += sB; stats[p].ga += sA;
      });
      // 记录 H2H 对阵净胜分（跨队选手两两记录）
      m.teamA.forEach(function(pA) {
        m.teamB.forEach(function(pB) {
          if (!stats[pA] || !stats[pB]) return;
          if (!stats[pA].h2h[pB]) stats[pA].h2h[pB] = 0;
          stats[pA].h2h[pB] += sA - sB;
          if (!stats[pB].h2h[pA]) stats[pB].h2h[pA] = 0;
          stats[pB].h2h[pA] += sB - sA;
        });
      });
      if (m.teamA.length === 2) {
        var a00 = m.teamA[0], a01 = m.teamA[1];
        if (stats[a00]) stats[a00].partners[a01] = (stats[a00].partners[a01]||0)+1;
        if (stats[a01]) stats[a01].partners[a00] = (stats[a01].partners[a00]||0)+1;
      }
      if (m.teamB.length === 2) {
        var b00 = m.teamB[0], b01 = m.teamB[1];
        if (stats[b00]) stats[b00].partners[b01] = (stats[b00].partners[b01]||0)+1;
        if (stats[b01]) stats[b01].partners[b00] = (stats[b01].partners[b00]||0)+1;
      }
    });
  });
  return stats;
}

function renderRank() {
  var cont = document.getElementById('rankContent');
  if (!state || !state.started || !state.rounds.length) {
    cont.innerHTML = '<div class="empty"><div class="icon">🏆</div>比赛尚未开始</div>';
    return;
  }
  var stats = calcStats();
  var isGroup = state.format === 'group';
  var sorted = Object.values(stats).sort(function(a, b) {
    if (isGroup) {
      // 小组赛：胜场 → H2H对阵净胜分 → 总净胜分 → 总得分
      if (b.win !== a.win) return b.win - a.win;
      var h2h = 0;
      if (a.h2h && a.h2h[b.name] !== undefined) {
        h2h = a.h2h[b.name];
      } else if (b.h2h && b.h2h[a.name] !== undefined) {
        h2h = -b.h2h[a.name];
      }
      if (h2h !== 0) return -h2h;
      var da = a.gf - a.ga, db = b.gf - b.ga;
      if (db !== da) return db - da;
      return b.gf - a.gf;
    } else {
      // 轮转赛：积分 → 总净胜分 → 总得分（原逻辑）
      if (b.pts !== a.pts) return b.pts - a.pts;
      var da = a.gf - a.ga, db = b.gf - b.ga;
      if (db !== da) return db - da;
      return b.gf - a.gf;
    }
  });

  function rankBadge(i) {
    if (i===0) return '<span class="rank-badge rank-1">1</span>';
    if (i===1) return '<span class="rank-badge rank-2">2</span>';
    if (i===2) return '<span class="rank-badge rank-3">3</span>';
    return '<span class="rank-badge rank-n">' + (i+1) + '</span>';
  }

  var tableHtml = '<div class="card">' +
    '<div class="card-title"><span class="dot"></span>积分排行榜 · ' + (state.name||'') + '</div>' +
    '<table class="lb-table">' +
      '<thead><tr><th>选手</th>' + (isGroup ? '<th>胜场</th>' : '') +
    '<th>积分</th><th>胜/负</th><th>得分</th><th>净胜</th></tr></thead>' +
      '<tbody>' +
        sorted.map(function(s, i) { return '<tr>' +
          '<td>' + rankBadge(i) + s.name + '</td>' +
          (isGroup ? '<td class="bold">' + s.win + '</td>' : '') +
          '<td class="bold ' + (isGroup?'':'green') + '">' + s.pts + '</td>' +
          '<td>' + s.win + '/' + s.lose + '</td>' +
          '<td>' + s.gf + '</td>' +
          '<td class="' + (s.gf-s.ga>=0?'green':'red') + '">' + (s.gf-s.ga>=0?'+':'') + (s.gf-s.ga) + '</td>' +
        '</tr>'; }).join('') +
      '</tbody></table></div>';

  var isSinglesMode = state.format === 'group' && state.groupType === 'singles';
  var partnerHtml = '';
  if (!isSinglesMode) {
    var hasPartners = sorted.some(function(s) { return Object.keys(s.partners).length > 0; });
    if (hasPartners) {
      partnerHtml = '<div class="card">' +
        '<div class="card-title"><span class="dot"></span>搭档配对记录</div>' +
        '<div class="partner-list">' +
          sorted.map(function(s) {
            var chips = Object.entries(s.partners).map(function(entry) { return '<span class="partner-chip">' + entry[0] + '×' + entry[1] + '</span>'; }).join('');
            return chips ? '<div class="partner-row"><span class="partner-name">' + s.name + '</span>' + chips + '</div>' : '';
          }).join('') +
        '</div></div>';
    }
  }

  var byeCount = {};
  state.players.forEach(function(p) { byeCount[p] = 0; });
  state.rounds.forEach(function(r) { r.waiting.forEach(function(p) { byeCount[p]++; }); });
  var totalByes = Object.values(byeCount).reduce(function(a, b) { return a + b; }, 0);
  var byeHtml = '<div class="card" style="margin-bottom:0;">' +
    '<div class="card-title"><span class="dot"></span>' + (isSinglesMode ? '比赛统计' : '上场/候场统计') + '</div>' +
    '<div class="partner-list">' +
      state.players.map(function(p) {
        var s = stats[p];
        var bye = byeCount[p]||0;
        return '<div class="partner-row">' +
          '<span class="partner-name">' + p + '</span>' +
          '<span class="partner-chip" style="background:var(--primary-light);color:var(--primary)">上场 ' + s.played + ' 次</span>' +
          (!isSinglesMode && bye > 0 ? '<span class="partner-chip" style="background:#fff3e0;color:#8a4000">候场 ' + bye + ' 次</span>' : '') +
        '</div>';
      }).join('') +
    '</div>' +
    '<button class="btn btn-secondary btn-block mt12" onclick="resetGame()">重置 · 重新开始</button>' +
    '</div>';

  cont.innerHTML = tableHtml + partnerHtml + byeHtml;
}

// =================== RESET ===================
function resetGame() {
  if (!state) return;
  if (!confirm('确认重置当前比赛？数据将清空，可重新设置后开始。')) return;
  state.players = state.players || [];
  state.rounds = [];
  state.currentRound = 0;
  state.started = false;
  state.finished = false;
  state.scoreMode = 'score';
  state.pointsRule = '3-1';
  state.courts = 2;
  saveData();
  syncHeader();
  showSetupDetailPage();
}

// =================== REGISTRATION SYSTEM ===================
const REG_KEY = 'upb_reg_v1'; // 共享报名数据 key

function getRegData() {
  try { return JSON.parse(localStorage.getItem(REG_KEY) || '{"pending":[],"approved":[]}'); }
  catch(e) { return { pending: [], approved: [] }; }
}

function saveRegData(rd) { localStorage.setItem(REG_KEY, JSON.stringify(rd)); }

function renderRegPage() {
  var cont = document.getElementById('regContent');
  if (!state) {
    cont.innerHTML = '<div class="no-tour-selected"><div class="icon">🏓</div><div class="msg">请先创建或选择一个比赛</div><button class="btn btn-primary" onclick="showListPage()">去赛事列表</button></div>';
    return;
  }
  var rd = getRegData();
  var tourRegs = rd.pending.filter(function(r) { return r.tourId === state.id; });
  var approved = rd.approved.filter(function(r) { return r.tourId === state.id; });

  // 当前 URL 作为报名链接（去掉查询参数）
  var baseUrl = location.href.split('?')[0];
  // 如果是 file:// 协议，提示需要启动本地服务
  var isFileUrl = baseUrl.startsWith('file://');
  var regUrl = baseUrl + '?reg=1&tour=' + encodeURIComponent(state.id) + '&name=' + encodeURIComponent(state.name || '比赛');

  var qrId = 'regQR_' + state.id;
  cont.innerHTML =
    '<div class="card">' +
      '<div class="card-title"><span class="dot"></span>报名二维码</div>' +
      (isFileUrl ?
        '<div class="reg-item" style="border-bottom:none;flex-direction:column;align-items:flex-start;gap:8px;">' +
          '<div class="text-sm" style="color:var(--accent);background:var(--accent-light);padding:8px 10px;border-radius:6px;font-size:13px;">⚠️ 当前为本地文件模式，二维码无法跨设备使用。</div>' +
          '<div class="text-sm" style="color:var(--text3);font-size:13px;">请先启动本地服务，再刷新获取新二维码：</div>' +
          '<code style="font-size:12px;background:var(--gray);padding:6px 10px;border-radius:4px;display:block;width:100%;word-break:break-all;">cd ' + baseUrl.replace('file://','').replace(/\/[^\/]*$/,'') + '\npython -m http.server 8080</code>' +
          '<div class="text-sm" style="color:var(--text3);font-size:12px;">启动后访问 <strong>http://localhost:8080</strong> 刷新页面，二维码链接将变为可访问地址</div>' +
        '</div>' :
        '<div id="' + qrId + '" style="display:flex;justify-content:center;padding:12px 0;"></div>'
      ) +
      '<div class="text-sm" style="text-align:center;color:var(--text3);margin-bottom:8px;">微信扫码报名，报名后需主办方审核</div>' +
      '<div class="setup-row" style="align-items:center;">' +
        '<span class="setup-label" style="font-size:12px;">报名链接</span>' +
        '<input class="player-input" id="regUrlInput" value="' + escapeHtml(regUrl) + '" readonly style="flex:1;font-size:12px;">' +
        '<button class="btn btn-outline btn-sm" style="margin-left:8px;flex-shrink:0;" onclick="copyRegUrl()">复制</button>' +
      '</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="card-title"><span class="dot"></span>待审核 <span class="badge" style="background:var(--accent-light);color:var(--accent);font-size:12px;padding:2px 8px;border-radius:10px;">' + tourRegs.length + '</span></div>' +
      (tourRegs.length === 0 ? '<div class="text-sm" style="color:var(--text3);padding:8px 0;">暂无待审核报名</div>' :
        '<div id="regPendingList">' + tourRegs.map(function(r, i) {
          var idx = rd.pending.indexOf(r);
          return '<div class="reg-item">' +
            '<div class="reg-info"><span class="reg-name">' + escapeHtml(r.name) + '</span><span class="reg-time">' + formatRegTime(r.time) + '</span></div>' +
            '<div class="btn-row" style="gap:6px;">' +
              '<button class="btn btn-primary btn-sm" onclick="approveReg(' + idx + ')">通过</button>' +
              '<button class="btn btn-secondary btn-sm" style="color:var(--accent);border-color:var(--accent);" onclick="rejectReg(' + idx + ')">拒绝</button>' +
            '</div>' +
          '</div>';
        }).join('') + '</div>'
      ) +
    '</div>' +
    '<div class="card">' +
      '<div class="card-title"><span class="dot"></span>已通过 (' + approved.length + ')</div>' +
      (approved.length === 0 ? '<div class="text-sm" style="color:var(--text3);padding:8px 0;">暂无已通过选手</div>' :
        '<div>' + approved.map(function(r) {
          return '<div class="reg-item">' +
            '<div class="reg-info"><span class="reg-name green">' + escapeHtml(r.name) + '</span><span class="reg-time">' + formatRegTime(r.time) + '</span></div>' +
            '<button class="btn-del" onclick="removeReg(\'approved\',' + approved.indexOf(r) + ')">×</button>' +
          '</div>';
        }).join('') + '</div>'
      ) +
    '</div>' +
    '<div class="card">' +
      '<button class="btn btn-secondary btn-block btn-sm" onclick="clearAllRegs()">清空所有报名记录</button>' +
    '</div>';

  // 生成二维码（仅 http URL 时）
  if (!isFileUrl) {
    var qrContainer = document.getElementById(qrId);
    if (qrContainer) {
      qrContainer.innerHTML = '';
      if (window.QRCode) {
        new QRCode(qrContainer, { text: regUrl, width: 160, height: 160, colorDark: '#1a1a1a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.H });
      }
    }
  }

  // 同设备跨窗口推送：如果 admin 页面有注册推送，则处理
  checkIncomingRegs();
  // 每 3 秒轮询一次 shared localStorage
  if (window._regPollTimer) clearInterval(window._regPollTimer);
  window._regPollTimer = setInterval(checkIncomingRegs, 3000);
}

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatRegTime(ts) {
  var d = new Date(ts);
  return d.getMonth()+1 + '/' + d.getDate() + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function copyRegUrl() {
  var inp = document.getElementById('regUrlInput');
  if (navigator.clipboard) { navigator.clipboard.writeText(inp.value); toast('已复制'); }
  else { inp.select(); document.execCommand('copy'); toast('已复制'); }
}

function checkIncomingRegs() {
  var pending = getRegData().pending;
  if (!state) return;
  var mine = pending.filter(function(r) { return r.tourId === state.id; });
  if (mine.length > 0) renderRegPage();
}

function approveReg(idx) {
  var rd = getRegData();
  var item = rd.pending[idx];
  if (!item) return;
  if (!state.players) state.players = [];
  // 避免重复姓名
  var exists = state.players.some(function(p) { return p.trim() === item.name.trim(); });
  if (!exists) {
    state.players.push(item.name.trim());
    saveData();
    renderPlayerList();
  }
  rd.pending.splice(idx, 1);
  rd.approved.push(item);
  saveRegData(rd);
  renderRegPage();
  toast('已通过：' + item.name);
}

function rejectReg(idx) {
  var rd = getRegData();
  var item = rd.pending[idx];
  if (!item) return;
  rd.pending.splice(idx, 1);
  saveRegData(rd);
  renderRegPage();
  toast('已拒绝：' + item.name);
}

function removeReg(type, idx) {
  var rd = getRegData();
  var arr = rd[type];
  if (!arr[idx]) return;
  var name = arr[idx].name;
  arr.splice(idx, 1);
  saveRegData(rd);
  renderRegPage();
  toast('已移除：' + name);
}

function clearAllRegs() {
  if (!confirm('确定清空所有报名记录？')) return;
  saveRegData({ pending: [], approved: [] });
  renderRegPage();
  toast('已清空');
}

// 报名弹窗
function showRegModal(tourId, tourName) {
  var rd = getRegData();
  var alreadyReg = rd.pending.some(function(r) { return r.tourId === tourId && r.name === window._myRegName; }) ||
                   rd.approved.some(function(r) { return r.tourId === tourId && r.name === window._myRegName; });
  var body = document.getElementById('regModalBody');
  body.innerHTML =
    '<div style="text-align:center;margin-bottom:16px;">' +
      '<div style="font-size:18px;font-weight:600;margin-bottom:4px;">' + escapeHtml(tourName) + '</div>' +
      '<div style="color:var(--text3);font-size:13px;">请填写您的姓名完成报名</div>' +
    '</div>' +
    '<div style="margin-bottom:12px;">' +
      '<input id="regNameInput" class="player-input" placeholder="输入您的姓名" value="' + (window._myRegName||'') + '" style="width:100%;">' +
    '</div>' +
    (alreadyReg ? '<div class="text-sm" style="color:var(--primary-mid);text-align:center;margin-bottom:12px;">您已报名成功，请等待审核</div>' : '') +
    '<button class="btn btn-primary btn-block" ' + (alreadyReg ? 'disabled style="opacity:0.5"' : '') + ' onclick="submitReg(\'' + escapeAttr(tourId) + '\')">提交报名</button>' +
    '<div class="text-sm" style="color:var(--text3);text-align:center;margin-top:12px;">报名后需主办方审核通过方可参赛</div>';
  document.getElementById('regModal').classList.add('show');
}

function closeRegModal() {
  document.getElementById('regModal').classList.remove('show');
}

function escapeAttr(s) {
  return (s||'').replace(/"/g, '&quot;');
}

function submitReg(tourId) {
  var name = document.getElementById('regNameInput').value.trim();
  if (!name) { toast('请输入姓名'); return; }
  if (name.length > 20) { toast('姓名不能超过20字'); return; }
  var rd = getRegData();
  // 避免重复报名
  var dup = rd.pending.some(function(r) { return r.tourId === tourId && r.name === name; }) ||
            rd.approved.some(function(r) { return r.tourId === tourId && r.name === name; });
  if (dup) { toast('您已报名，请勿重复提交'); return; }
  rd.pending.push({ tourId: tourId, name: name, time: Date.now() });
  saveRegData(rd);
  window._myRegName = name;
  // 尝试通知同设备的管理员页面
  try {
    var admins = document.querySelectorAll('iframe[name="admin_' + tourId + '"]');
    admins.forEach(function(iframe) {
      try { var win = iframe.contentWindow; if (win && win.checkIncomingRegs) win.checkIncomingRegs(); } catch(e) {}
    });
  } catch(e) {}
  closeRegModal();
  toast('报名成功！请等待审核');
  // 弹出确认提示
  setTimeout(function() {
    alert('报名成功！\n\n您的报名信息：' + name + '\n请将手机页面展示给主办方审核');
  }, 100);
}

// =================== PRINT PREVIEW ===================
function showPrintPreview() {
  if (!state || !state.rounds || !state.rounds.length) {
    toast('暂无赛程数据');
    return;
  }
  if (!window.jspdf || !window.jspdf.jsPDF) {
    toast('PDF 库加载失败，请检查网络后刷新页面');
    return;
  }

  var printDate = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});
  var validPlayers = (state.players || []).filter(function(p) { return p && p.trim(); }).length;
  var totalMatches = 0;
  state.rounds.forEach(function(r) { totalMatches += r.matches.length; });

  var doc = new jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var pageW = doc.internal.pageSize.getWidth();
  var margin = 14;
  var y = 20;

  // 标题
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.setTextColor(0, 0, 0);
  doc.text(state.name || '比赛', pageW / 2, y, { align: 'center' });
  y += 8;

  // 副标题
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(80, 80, 80);
  var sub = '日期：' + printDate + '    场地数：' + (state.courts || 2) + '    参赛人数：' + validPlayers + '人    共 ' + state.rounds.length + ' 轮 · ' + totalMatches + ' 场';
  doc.text(sub, pageW / 2, y, { align: 'center' });
  y += 12;

  // 表格数据
  var headers = [['轮次','场地','队伍 A','比分','队伍 B','状态']];
  var body = [];
  state.rounds.forEach(function(rd) {
    rd.matches.forEach(function(m) {
      var score = m.done ? (m.scoreA + ' - ' + m.scoreB) : '—';
      var status = m.done ? '✓' : '○';
      body.push(['第' + rd.round + '轮', String(m.court), m.teamA.join(' / '), score, m.teamB.join(' / '), status]);
    });
  });

  doc.autoTable({
    head: headers,
    body: body,
    startY: y,
    margin: { left: margin, right: margin },
    styles: { fontSize: 9, textColor: [0,0,0], lineColor: [140,140,140], lineWidth: 0.2, font: 'helvetica' },
    headStyles: { fillColor: [220,220,220], textColor: [0,0,0], fontStyle: 'bold', lineColor: [100,100,100] },
    alternateRowStyles: { fillColor: [245,245,245] },
    tableLineColor: [180,180,180],
    tableLineWidth: 0.2,
  });

  // 页脚
  var finalY = doc.lastAutoTable ? doc.lastAutoTable.endY + 10 : y + 20;
  doc.setFontSize(8);
  doc.setTextColor(150, 150, 150);
  doc.text('球馆小赛 · 扫码管理赛程', pageW / 2, finalY, { align: 'center' });

  // 输出到 iframe 预览
  var blob = doc.output('blob');
  var url = URL.createObjectURL(blob);
  var frame = document.getElementById('pdfPreviewFrame');
  frame.src = url;
  document.getElementById('printPreviewModal').classList.add('show');

  // 保存供下载
  window.__schedulePDFDoc = doc;
  window.__schedulePDFUrl = url;
}

function closePrintPreview() {
  var frame = document.getElementById('pdfPreviewFrame');
  if (frame) frame.src = '';
  if (window.__schedulePDFUrl) { URL.revokeObjectURL(window.__schedulePDFUrl); window.__schedulePDFUrl = null; }
  document.getElementById('printPreviewModal').classList.remove('show');
}

function downloadPDF() {
  var doc = window.__schedulePDFDoc;
  if (!doc) { toast('PDF 尚未生成'); return; }
  doc.save((state.name || '比赛') + '_赛程表.pdf');
}

// 处理扫码报名参数 ?reg=1&tour=xxx
(function() {
  var params = {};
  location.search.slice(1).split('&').forEach(function(pair) {
    var kv = pair.split('=');
    params[decodeURIComponent(kv[0]||'')] = decodeURIComponent(kv[1]||'');
  });
  if (params.reg === '1' && params.tour) {
    // 扫码报名模式：隐藏主 app，显示报名弹窗
    var targetTour = data.tournaments.find(function(t) { return t.id === params.tour; });
    if (targetTour) {
      activateTournament(targetTour.id);
      document.getElementById('app').style.display = 'none';
      document.getElementById('regModal').classList.add('show');
      showRegModal(params.tour, params.name || targetTour.name || '比赛报名');
    } else {
      document.getElementById('app').style.display = 'none';
      document.getElementById('regModal').classList.add('show');
      document.getElementById('regModalBody').innerHTML =
        '<div style="text-align:center;padding:20px 0;"><div class="icon" style="font-size:40px;">⚠️</div>' +
        '<div style="font-size:15px;font-weight:600;margin:12px 0;">未找到对应比赛</div>' +
        '<div class="text-sm" style="color:var(--text3);">可能比赛已被删除，请联系主办方确认。</div></div>';
    }
    return;
  }
  // 正常启动：显示赛事列表页
  showListPage();
})();
